name: Tests

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: |
          uv run pytest tests/ -v --tb=short -x --ignore=tests/test_smoke.py --ignore=tests/test_snapshots.py

      - name: Run smoke test
        run: |
          uv run pytest tests/test_smoke.py -v --tb=short

      - name: Run snapshot tests
        run: |
          uv run pytest tests/test_snapshots.py -v --tb=short

